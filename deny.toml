# cargo-deny configuration for Forgemax
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check --all-features

[graph]
all-features = true

[advisories]
# All vulnerability advisories are errors by default in cargo-deny v2.
# Only flag unmaintained crates that are direct workspace dependencies.
unmaintained = "workspace"

[licenses]
# In cargo-deny v2, all licenses are denied unless explicitly allowed.
# No separate unlicensed/copyleft fields — the allow list is the sole control.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
# Workspace crates use FSL-1.1-ALv2 (Functional Source License),
# which is not a standard SPDX identifier. Allow it explicitly.
exceptions = [
    { allow = ["FSL-1.1-ALv2"], crate = "forgemax" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-sandbox" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-sandbox-worker" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-manifest" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-server" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-client" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-config" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-error" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-audit" },
    { allow = ["FSL-1.1-ALv2"], crate = "forge-test-server" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
